name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version PR / git tags
      pull-requests: write # open the "Version Packages" PR
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # needs >= 11.5.1 for OIDC

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npm run release # runs `changeset publish` under npm => OIDC + provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
